name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Sync version with tag
        run: |
          # For 'release' events use the release tag name; for 'push tag' use GITHUB_REF_NAME
          RAW_TAG="${{ github.event.release.tag_name }}"
          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="$GITHUB_REF_NAME"
          fi

          # Strip leading 'v' (e.g. v1.0.3 → 1.0.3)
          TAG_VERSION="${RAW_TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Raw tag   : $RAW_TAG"
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"

          if [ -z "$TAG_VERSION" ]; then
            echo "::warning::No tag version detected (RAW_TAG='$RAW_TAG'). Skipping version sync."
            exit 0
          fi

          # Update package.json version to match the tag if they differ
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Updating package.json version from $PKG_VERSION to $TAG_VERSION"
            npm version "$TAG_VERSION" --no-git-tag-version
          else
            echo "Version already in sync: $PKG_VERSION"
          fi


      - name: Publish to npm
        # NPM_CONFIG_USERCONFIG=/dev/null bypasses the temp .npmrc that setup-node writes
        # (which contains an empty _authToken that blocks OIDC / Trusted Publisher auth)
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_USERCONFIG: /dev/null
